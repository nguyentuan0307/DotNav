name: Promote Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: promote-release
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out master
        uses: actions/checkout@v5
        with:
          ref: master
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Create or update promotion PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git fetch origin master --prune

          if ! git ls-remote --exit-code --heads origin release >/dev/null 2>&1; then
            git push origin origin/master:refs/heads/release
            echo "Created release branch from master. No promotion PR is needed yet."
            exit 0
          fi

          git fetch origin release

          if [ "$(git rev-list --count origin/release..origin/master)" = "0" ]; then
            echo "release already contains master."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -C release-candidate origin/master

          node .github/scripts/prepare-release-candidate.mjs \
            --base origin/release \
            --head HEAD \
            --repo-url "${{ github.repository }}"

          if git diff --quiet; then
            echo "No releasable changes were found."
            exit 0
          fi

          git add .release-please-manifest.json package-lock.json extensions/*/package.json extensions/*/CHANGELOG.md
          git commit -m "chore: prepare release candidate"
          git push --force-with-lease origin release-candidate

          body="$(cat <<'BODY'
          Promotes the current master branch into release with version and changelog updates already prepared.

          Merge this PR when you want to publish the accumulated changes. After merge, GitHub Releases and VSIX assets are created automatically.

          Source branch: master
          Prepared branch: release-candidate
          BODY
          )"

          existing_pr="$(gh pr list --base release --head release-candidate --state open --json url --jq '.[0].url')"
          if [ -n "$existing_pr" ]; then
            gh pr edit "$existing_pr" --title "release: promote master to release" --body "$body"
            echo "Updated $existing_pr"
          else
            gh pr create --base release --head release-candidate --title "release: promote master to release" --body "$body"
          fi
