name: Build Release Asset

on:
  workflow_call:
    inputs:
      ref:
        description: Component release tag to package
        required: true
        type: string
  workflow_dispatch:
    inputs:
      ref:
        description: Existing tag, for example dotnav-v0.2.0 or gitnav-v0.1.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-asset-${{ inputs.ref }}
  cancel-in-progress: false

jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run all tests
        run: npm test

      - name: Resolve component metadata
        id: metadata
        env:
          RELEASE_REF: ${{ inputs.ref }}
        run: |
          case "$RELEASE_REF" in
            dotnav-v*)
              WORKSPACE="dotnav"
              PACKAGE_PATH="extensions/dotnav"
              TAG_VERSION="${RELEASE_REF#dotnav-v}"
              ;;
            gitnav-v*)
              WORKSPACE="gitnav"
              PACKAGE_PATH="extensions/gitnav"
              TAG_VERSION="${RELEASE_REF#gitnav-v}"
              ;;
            *)
              echo "Unsupported release tag: $RELEASE_REF" >&2
              exit 1
              ;;
          esac

          PACKAGE_VERSION="$(node -p "require('./$PACKAGE_PATH/package.json').version")"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Release tag $RELEASE_REF does not match $PACKAGE_PATH version $PACKAGE_VERSION" >&2
            exit 1
          fi

          echo "workspace=$WORKSPACE" >> "$GITHUB_OUTPUT"
          echo "vsix=$WORKSPACE-$PACKAGE_VERSION.vsix" >> "$GITHUB_OUTPUT"

      - name: Package component VSIX
        run: npm run package:vsix --workspace "${{ steps.metadata.outputs.workspace }}" -- --out "../../${{ steps.metadata.outputs.vsix }}"

      - name: Attach VSIX to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_REF: ${{ inputs.ref }}
          VSIX_PATH: ${{ steps.metadata.outputs.vsix }}
        run: gh release upload "$RELEASE_REF" "$VSIX_PATH" --clobber
