name: Release Please

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-please-master
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      dotnav_release_created: ${{ steps.release.outputs['extensions/dotnav--release_created'] }}
      dotnav_tag_name: ${{ steps.release.outputs['extensions/dotnav--tag_name'] }}
      gitnav_release_created: ${{ steps.release.outputs['extensions/gitnav--release_created'] }}
      gitnav_tag_name: ${{ steps.release.outputs['extensions/gitnav--tag_name'] }}

    steps:
      - name: Create or update the Release PR
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-dotnav-release-asset:
    needs: release
    if: ${{ needs.release.outputs.dotnav_release_created == 'true' }}
    uses: ./.github/workflows/build-release.yml
    with:
      ref: ${{ needs.release.outputs.dotnav_tag_name }}

  build-gitnav-release-asset:
    needs: release
    if: ${{ needs.release.outputs.gitnav_release_created == 'true' }}
    uses: ./.github/workflows/build-release.yml
    with:
      ref: ${{ needs.release.outputs.gitnav_tag_name }}
