name: Release

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      dotnav_release_created: ${{ steps.release.outputs.dotnav_release_created }}
      dotnav_tag_name: ${{ steps.release.outputs.dotnav_tag_name }}
      gitnav_release_created: ${{ steps.release.outputs.gitnav_release_created }}
      gitnav_tag_name: ${{ steps.release.outputs.gitnav_tag_name }}

    steps:
      - name: Check out release
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Configure release git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create GitHub releases
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: node .github/scripts/create-github-releases.mjs

  build-dotnav-release-asset:
    needs: release
    if: ${{ needs.release.outputs.dotnav_release_created == 'true' }}
    uses: ./.github/workflows/build-release.yml
    with:
      ref: ${{ needs.release.outputs.dotnav_tag_name }}

  build-gitnav-release-asset:
    needs: release
    if: ${{ needs.release.outputs.gitnav_release_created == 'true' }}
    uses: ./.github/workflows/build-release.yml
    with:
      ref: ${{ needs.release.outputs.gitnav_tag_name }}
